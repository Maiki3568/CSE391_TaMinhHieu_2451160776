<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký tài khoản</title>
</head>
<body>

  <h1>Đăng ký tài khoản</h1>

  <form action="#" method="POST">

    <fieldset>
      <legend>Thông tin cá nhân</legend>

      <div>
        <label for="fullname">Họ tên *</label><br>
        <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="Tạ Minh Hiếu">
      </div>
      <br>

      <div>
        <label for="gmail">Email *</label><br>
        <input type="email" id="gmail" name="gmail" required placeholder="hieuminh2nd@gmail.com">
      </div>
      <br>

      <div>
        <label for="phone">Số điện thoại</label><br>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="0975868825">
      </div>
      <br>

      <div>
        <label for="dob">Ngày sinh</label><br>
        <input type="date" id="dob" name="dob" max="2026-04-30">
      </div>
    </fieldset>

    <br>

    <fieldset>
      <legend>Tài khoản</legend>

      <div>
        <label for="username">Username *</label><br>
        <input type="text" id="username" name="username" required pattern="[a-zA-Z0-9_]{3,20}" placeholder="ten_nguoi_dung">
      </div>
      <br>

      <div>
        <label for="password">Mật khẩu *</label><br>
        <input type="password" id="password" name="password" required minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" placeholder="Tối thiểu 8 ký tự, 1 chữ hoa, 1 số">
      </div>
      <br>

      <div>
        <label for="confirm_password">Xác nhận mật khẩu *</label><br>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" placeholder="Nhập lại mật khẩu">
      </div>
    </fieldset>

    <br>

    <fieldset>
      <legend>Thông tin giao hàng</legend>

      <div>
        <label for="city">Tỉnh/Thành phố *</label><br>
        <select id="city" name="city" required>
          <option value="">-- Chọn tỉnh/thành --</option>
          <option value="hanoi">Hà Nội</option>
          <option value="hcm">Hồ Chí Minh</option>
          <option value="danang">Đà Nẵng</option>
          <option value="hue">Thừa Thiên Huế</option>
          <option value="cantho">Cần Thơ</option>
          <option value="haiphong">Hải Phòng</option>
        </select>
      </div>
      <br>

      <div>
        <label for="district">Quận/Huyện *</label><br>
        <select id="district" name="district" required>
          <option value="">-- Chọn quận/huyện --</option>
          <option value="q1">Quận 1</option>
          <option value="q2">Quận 2</option>
          <option value="q3">Quận 3</option>
          <option value="hk">Hoàn Kiếm</option>
          <option value="bd">Ba Đình</option>
          <option value="hd">Hải Châu</option>
        </select>
      </div>
      <br>

      <div>
        <label for="address">Địa chỉ chi tiết</label><br>
        <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường, phường/xã..."></textarea>
      </div>
      <br>

      <div>
        <label>Giới tính</label><br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Nam</label>
        &nbsp;
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Nữ</label>
        &nbsp;
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Khác</label>
      </div>
    </fieldset>

    <br>

    <div>
      <input type="checkbox" id="terms" name="terms" required>
      <label for="terms">Tôi đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a></label>
    </div>

    <br>

    <div>
      <button type="submit">Đăng ký</button>
      &nbsp;
      <button type="reset">Nhập lại</button>
    </div>

  </form>

</body>
</html>
